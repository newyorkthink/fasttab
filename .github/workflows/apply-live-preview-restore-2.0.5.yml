name: Apply FastTab 2.0.5 live-preview restoration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: >-
      github.head_ref == 'agent/restore-upstream-live-previews-2.0.5' &&
      github.event.pull_request.head.sha == github.sha
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Restore generic preview build path
        run: |
          git show a8980c58d60928c6ca19a668aca02dbe9572c12d:build.zig > build.zig
          git show a8980c58d60928c6ca19a668aca02dbe9572c12d:.github/workflows/ci.yml > .github/workflows/ci.yml
          git show a8980c58d60928c6ca19a668aca02dbe9572c12d:README.md > README.md
          git show a8980c58d60928c6ca19a668aca02dbe9572c12d:README.zh-CN.md > README.zh-CN.md
          git show e8aceb726c45dbf8d491e4a7eac79ec1cd97e363:src/shaders/downsample.fs > src/shaders/downsample.fs
          rm -f tools/generate_gpu_preview_sources.py
          rm -f tools/fix_generated_gpu_source.py

      - name: Apply source restoration
        run: |
          python -m py_compile .github/scripts/apply_live_preview_restore_2_0_5.py
          python .github/scripts/apply_live_preview_restore_2_0_5.py
          rm -f .github/scripts/apply_live_preview_restore_2_0_5.py
          rm -f .github/workflows/apply-live-preview-restore-2.0.5.yml
          git diff --check

      - name: Commit restored preview lifecycle
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Restore generic upstream live previews'
          git push origin HEAD:${{ github.head_ref }}
