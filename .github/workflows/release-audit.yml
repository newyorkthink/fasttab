name: Release Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate 2.0.0 tag source
        run: |
          git fetch --tags --force
          git show 2.0.0:VERSION | grep -Fxq '2.0.0'
          git show 2.0.0:build_packages.sh | grep -Fq 'License:        GPL-3.0-only'
          git show 2.0.0:build_packages.sh | grep -Fq '/usr/share/doc/fasttab/LICENSE.md'

      - name: Validate published release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/2.0.0" > release.json
          python - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path("release.json").read_text(encoding="utf-8"))
          assert release["tag_name"] == "2.0.0"
          assert release["draft"] is False
          assert release["prerelease"] is False

          expected = {
              "FastTab-2.0.0-x86_64.AppImage",
              "FastTab-2.0.0-x86_64.AppImage.sha256",
              "FastTab-2.0.0-x86_64.AppImage.zsync",
              "FastTab-2.0.0-aarch64.AppImage",
              "FastTab-2.0.0-aarch64.AppImage.sha256",
              "FastTab-2.0.0-aarch64.AppImage.zsync",
              "fasttab_2.0.0_amd64.deb",
              "fasttab_2.0.0_amd64.deb.sha256",
              "fasttab_2.0.0_arm64.deb",
              "fasttab_2.0.0_arm64.deb.sha256",
              "fasttab-2.0.0-1.x86_64.rpm",
              "fasttab-2.0.0-1.x86_64.rpm.sha256",
              "fasttab-2.0.0-1.aarch64.rpm",
              "fasttab-2.0.0-1.aarch64.rpm.sha256",
          }

          assets = {asset["name"]: asset for asset in release["assets"]}
          missing = expected - assets.keys()
          assert not missing, f"Missing release assets: {sorted(missing)}"
          assert all(assets[name]["size"] > 0 for name in expected)
          assert "fasttab-x86_64" not in assets
          PY
