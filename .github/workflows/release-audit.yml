name: Release Audit

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI/CD]
    types: [completed]

permissions:
  contents: read

jobs:
  audit-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve and validate release tag source
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git fetch --tags --force
          git show "${VERSION}:VERSION" | grep -Fxq "$VERSION"
          git show "${VERSION}:build_packages.sh" | grep -Fq 'License:        GPL-3.0-only'
          git show "${VERSION}:build_packages.sh" | grep -Fq '/usr/share/doc/fasttab/LICENSE.md'

      - name: Wait for and validate published release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for attempt in $(seq 1 20); do
            if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${VERSION}" > release.json 2>/dev/null; then
              break
            fi
            if [[ "$attempt" == 20 ]]; then
              echo "Release ${VERSION} was not published within the audit window." >&2
              exit 1
            fi
            sleep 15
          done

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          release = json.loads(Path("release.json").read_text(encoding="utf-8"))
          assert release["tag_name"] == version
          assert release["draft"] is False
          assert release["prerelease"] is False

          expected = {
              f"FastTab-{version}-x86_64.AppImage",
              f"FastTab-{version}-x86_64.AppImage.sha256",
              f"FastTab-{version}-x86_64.AppImage.zsync",
              f"FastTab-{version}-aarch64.AppImage",
              f"FastTab-{version}-aarch64.AppImage.sha256",
              f"FastTab-{version}-aarch64.AppImage.zsync",
              f"fasttab_{version}_amd64.deb",
              f"fasttab_{version}_amd64.deb.sha256",
              f"fasttab_{version}_arm64.deb",
              f"fasttab_{version}_arm64.deb.sha256",
              f"fasttab-{version}-1.x86_64.rpm",
              f"fasttab-{version}-1.x86_64.rpm.sha256",
              f"fasttab-{version}-1.aarch64.rpm",
              f"fasttab-{version}-1.aarch64.rpm.sha256",
          }

          assets = {asset["name"]: asset for asset in release["assets"]}
          missing = expected - assets.keys()
          assert not missing, f"Missing release assets: {sorted(missing)}"
          assert all(assets[name]["size"] > 0 for name in expected)
          assert "fasttab-x86_64" not in assets
          PY
