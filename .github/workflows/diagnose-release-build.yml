name: Diagnose ReleaseSafe build

on:
  push:
    branches:
      - agent/fix-edge-remmina-previews-2.0.4

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential curl tar xz-utils libasound2-dev libgl1-mesa-dev libglu1-mesa-dev libwayland-dev libx11-dev libx11-xcb-dev libxcb-composite0-dev libxcb-damage0-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-shm0-dev libxcb-util0-dev libxcb1-dev libxcursor-dev libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Prepare dependencies
        run: ./setup.sh >/dev/null 2>&1

      - name: Capture ReleaseSafe build log
        id: build
        shell: bash
        run: |
          set +e
          zig build -Doptimize=ReleaseSafe -Dcpu=baseline >release-build.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 120 release-build.log
          exit 0

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: release-build-log
          path: release-build.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail when build failed
        if: steps.build.outputs.status != '0'
        run: exit 1
