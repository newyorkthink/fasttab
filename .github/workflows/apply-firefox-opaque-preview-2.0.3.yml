name: Apply FastTab 2.0.3 Firefox preview fix

on:
  push:
    branches:
      - agent/fix-firefox-transparent-preview-2.0.3
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: >-
      (github.event_name == 'pull_request' && github.head_ref == 'agent/fix-firefox-transparent-preview-2.0.3') ||
      (github.event_name == 'push' && github.event.head_commit.message != 'Fix Firefox transparent previews')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-firefox-transparent-preview-2.0.3
          fetch-depth: 0

      - name: Apply source and release changes
        run: python .github/scripts/apply_firefox_opaque_preview_2_0_3.py

      - name: Commit generated fix
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f .github/scripts/apply_firefox_opaque_preview_2_0_3.py
          rm -f .github/workflows/apply-firefox-opaque-preview-2.0.3.yml
          git add -A
          git commit -m 'Fix Firefox transparent previews'
          git push origin HEAD:agent/fix-firefox-transparent-preview-2.0.3
