name: Apply FastTab 2.0.4 GPU black-preview fix

on:
  push:
    branches:
      - agent/fix-gpu-black-previews-2.0.4

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message != 'Fix GPU-backed black previews'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-gpu-black-previews-2.0.4
          fetch-depth: 0

      - name: Apply source and release changes
        run: python .github/scripts/apply_gpu_black_preview_fix_2_0_4.py

      - name: Commit generated fix
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f .github/scripts/apply_gpu_black_preview_fix_2_0_4.py
          rm -f .github/workflows/apply-gpu-black-preview-fix-2.0.4.yml
          git add -A
          git commit -m 'Fix GPU-backed black previews'
          git push origin HEAD:agent/fix-gpu-black-previews-2.0.4

# Trigger after workflow registration.
