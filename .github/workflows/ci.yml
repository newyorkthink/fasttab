name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  APT_PACKAGES: >-
    libasound2-dev
    libgl1-mesa-dev
    libglu1-mesa-dev
    libwayland-dev
    libx11-dev
    libx11-xcb-dev
    libxcb-composite0-dev
    libxcb-damage0-dev
    libxcb-image0-dev
    libxcb-keysyms1-dev
    libxcb-shm0-dev
    libxcb-util0-dev
    libxcb1-dev
    libxcursor-dev
    libxi-dev
    libxinerama-dev
    libxkbcommon-dev
    libxrandr-dev
    libglfw3-dev
    libxcb-keysyms1-dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y $APT_PACKAGES

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Download dependencies
        run: chmod +x ./setup.sh && ./setup.sh

      - name: Run Tests
        run: zig build test

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check for changes
        id: check_changes
        run: python .github/scripts/should_release.py

      - name: Install system dependencies
        if: steps.check_changes.outputs.should_release == 'true'
        run: sudo apt-get update && sudo apt-get install -y $APT_PACKAGES

      - name: Setup Zig
        if: steps.check_changes.outputs.should_release == 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Download dependencies
        if: steps.check_changes.outputs.should_release == 'true'
        run: chmod +x ./setup.sh && ./setup.sh

      - name: Build Release
        if: steps.check_changes.outputs.should_release == 'true'
        run: zig build -Doptimize=ReleaseSafe

      - name: Generate Changelog
        id: generate_log
        if: steps.check_changes.outputs.should_release == 'true'
        run: |
          CHANGELOG=$(python .github/scripts/collate_commits.py)
          {
            echo 'changelog_content<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Bump version and push tag
        id: tag_version
        if: steps.check_changes.outputs.should_release == 'true'
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: steps.check_changes.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.generate_log.outputs.changelog_content }}
          files: zig-out/bin/fasttab
