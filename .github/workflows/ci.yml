name: Apply FastTab 2.0.4 GPU black-preview fix

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message != 'Fix GPU-backed black previews'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore CI and apply source patch
        run: |
          git show a8980c58d60928c6ca19a668aca02dbe9572c12d:.github/workflows/ci.yml > .github/workflows/ci.yml
          python .github/scripts/apply_gpu_black_preview_fix_2_0_4.py
          rm -f .github/scripts/apply_gpu_black_preview_fix_2_0_4.py

      - name: Commit generated fix
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Fix GPU-backed black previews'
          git push origin HEAD:main
