name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: fasttab-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APT_PACKAGES: >-
    desktop-file-utils
    libasound2-dev
    libgl1-mesa-dev
    libglu1-mesa-dev
    libwayland-dev
    libx11-dev
    libx11-xcb-dev
    libxcb-composite0-dev
    libxcb-damage0-dev
    libxcb-image0-dev
    libxcb-keysyms1-dev
    libxcb-shm0-dev
    libxcb-util0-dev
    libxcb1-dev
    libxcursor-dev
    libxi-dev
    libxinerama-dev
    libxkbcommon-dev
    libxrandr-dev
    libglfw3-dev

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y $APT_PACKAGES

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Validate release, routing, and packaging files
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          python -m py_compile .github/scripts/*.py
          python -c "import xml.etree.ElementTree as ET; ET.parse('packaging/fasttab.svg')"
          bash -n build_appimage.sh
          desktop-file-validate packaging/fasttab.desktop
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          grep -Fq 'Exec=fasttab daemon --replace' packaging/fasttab.desktop
          grep -Fq "X-AppImage-Version=${VERSION}" packaging/fasttab.desktop
          grep -Fq 'fn routeIdleTab' src/main.zig
          grep -Fq '.current_workspace => application.handleWinTab' src/main.zig
          if grep -Fq 'const is_super =' src/main.zig; then
            echo "Idle Win+Tab routing must not depend on the delivered MOD4 bit." >&2
            exit 1
          fi

      - name: Download dependencies
        run: ./setup.sh

      - name: Run tests
        run: zig build test

      - name: Build ReleaseSafe binary
        run: zig build -Doptimize=ReleaseSafe -Dcpu=baseline

      - name: Validate binary
        run: test -x zig-out/bin/fasttab

  appimage:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    container: ghcr.io/pkgforge-dev/archlinux:latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Pre-install Git
        run: pacman -Sy --noconfirm git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare AnyLinux environment
        uses: pkgforge-dev/anylinux-setup-action@8872fabe63f9a00b35e25b2f46da62a05afc9a7d

      - name: Setup Yay for root execution
        run: |
          useradd -m -G wheel builduser || true
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su - builduser -c "git clone https://aur.archlinux.org/yay-bin.git /tmp/yay-bin && cd /tmp/yay-bin && makepkg -si --noconfirm"
          printf '%s\n' '#!/usr/bin/env bash' 'exec sudo -HE -u builduser /usr/bin/yay "$@"' > /usr/local/bin/yay
          chmod +x /usr/local/bin/yay

      - name: Build FastTab AppImage
        run: |
          chmod +x build_appimage.sh setup.sh
          ./build_appimage.sh

      - name: Validate AppImage contents
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          APPIMAGE="dist/FastTab-${VERSION}-x86_64.AppImage"
          test -s "$APPIMAGE"
          file "$APPIMAGE"
          test -e AppDir/AppRun
          test -x AppDir/shared/bin/fasttab
          test -x AppDir/AppRun.sh
          find AppDir -name '*.desktop' -print -quit | grep -q .
          find AppDir \( -iname 'fasttab.svg' -o -iname 'fasttab.png' \) -print -quit | grep -q .
          grep -Rqs '^Exec=fasttab daemon --replace$' AppDir
          grep -Rqs "^X-AppImage-Version=${VERSION}$" AppDir
          grep -Fq 'set -- daemon --replace "$@"' AppDir/AppRun.sh
          (
            cd dist
            sha256sum -c "FastTab-${VERSION}-x86_64.AppImage.sha256"
            sha256sum -c fasttab-x86_64.sha256
          )

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: fasttab-release-files
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [test, appimage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid VERSION: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify --quiet "refs/tags/$VERSION" >/dev/null; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Release tag $VERSION already exists; skipping publication."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release files
        if: steps.version.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: fasttab-release-files
          path: dist

      - name: Write release notes
        if: steps.version.outputs.publish == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "FastTab ${VERSION} fixes Win+Tab event routing on X11."
            echo
            echo "Idle grabbed Tab events are now routed by the Alt modifier instead of requiring the delivered Super/Mod4 state bit. Alt+Tab continues to switch across all tracked windows, while Win+Tab reliably enters current-workspace mode."
            echo
            echo "Included downloads:"
            echo
            printf -- '- `FastTab-%s-x86_64.AppImage`: portable x86_64 build packaged with quick-sharun.\n' "$VERSION"
            printf -- '- `FastTab-%s-x86_64.AppImage.zsync`: binary update metadata.\n' "$VERSION"
            echo '- `fasttab-x86_64`: standalone ReleaseSafe binary.'
            echo '- SHA-256 checksum files for the AppImage and standalone binary.'
            echo
            echo "Shortcuts:"
            echo
            echo '- `Alt+Tab`: switch across all tracked windows.'
            echo '- `Win+Tab`: switch only between windows on the current workspace.'
            echo '- Add `Shift` for reverse navigation.'
            echo
            echo "FastTab requires X11 and hardware-accelerated OpenGL."
          } > RELEASE_NOTES.md

      - name: Publish FastTab release
        if: steps.version.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: FastTab ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist/*
          draft: false
          prerelease: false
          make_latest: true
