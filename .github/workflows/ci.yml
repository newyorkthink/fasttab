name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: fasttab-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APT_PACKAGES: >-
    build-essential
    curl
    tar
    xz-utils
    file
    git
    wget
    patchelf
    binutils
    desktop-file-utils
    librsvg2-bin
    zsync
    zstd
    rpm
    dpkg-dev
    strace
    dbus-x11
    libfuse2t64
    libasound2-dev
    libgl1-mesa-dev
    libglu1-mesa-dev
    libwayland-dev
    libx11-dev
    libx11-xcb-dev
    libxcb-composite0-dev
    libxcb-damage0-dev
    libxcb-image0-dev
    libxcb-keysyms1-dev
    libxcb-shm0-dev
    libxcb-util0-dev
    libxcb1-dev
    libxcursor-dev
    libxi-dev
    libxinerama-dev
    libxkbcommon-dev
    libxrandr-dev

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Validate source and metadata
        run: |
          set -euxo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          [[ "$VERSION" == "2.0.7" ]]
          python -m py_compile .github/scripts/*.py
          python -c "import xml.etree.ElementTree as ET; ET.parse('packaging/fasttab.svg')"
          bash -n setup.sh build_appimage.sh build_packages.sh
          test -s LICENSE.md
          test ! -e tools/generate_gpu_preview_sources.py
          test ! -e tools/fix_generated_gpu_source.py
          grep -Fq "X-AppImage-Version=$VERSION" packaging/fasttab.desktop
          grep -Fq "const FASTTAB_VERSION = \"$VERSION\";" src/main.zig
          grep -Fq 'self.releaseAllBindings();' src/app.zig
          grep -Fq 'if (self.window_hidden) return;' src/app.zig
          grep -Fq 'tex.reacquire(self.conn)' src/app.zig
          grep -Fq 'fn cacheSnapshotForWindow' src/app.zig
          grep -Fq 'finalColor = vec4(averaged.rgb * fragColor.rgb, fragColor.a);' src/shaders/downsample.fs
          ! grep -Fq 'microsoft-edge' src/app.zig src/x11.zig build.zig
          ! grep -Fq 'remmina' src/app.zig src/x11.zig build.zig
          ! grep -Fq 'uploadWindowFromRoot' src/app.zig src/x11.zig build.zig
          grep -Fq 'README.zh-CN.md' README.md
          grep -Fq 'License:        GPL-3.0-only' build_packages.sh
          grep -Fq '/usr/share/doc/fasttab/LICENSE.md' build_packages.sh

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y $APT_PACKAGES

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Validate desktop metadata
        run: desktop-file-validate packaging/fasttab.desktop

      - name: Download and build dependencies
        run: ./setup.sh

      - name: Run tests
        run: zig build test

      - name: Build ReleaseSafe binary
        run: zig build -Doptimize=ReleaseSafe -Dcpu=baseline

      - name: Validate CLI streams
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          test -x zig-out/bin/fasttab
          zig-out/bin/fasttab --help >help.out 2>help.err
          grep -Fq "FastTab $VERSION" help.out
          test ! -s help.err
          zig-out/bin/fasttab --version >version.out 2>version.err
          grep -Fxq "FastTab $VERSION" version.out
          test ! -s version.err
          set +e
          zig-out/bin/fasttab --invalid >invalid.out 2>invalid.err
          status=$?
          set -e
          test "$status" -eq 2
          test ! -s invalid.out
          grep -Fq 'Error: unknown argument: --invalid' invalid.err

  packages:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            appimage_arch: x86_64
            deb_arch: amd64
            rpm_arch: x86_64
          - runner: ubuntu-24.04-arm
            appimage_arch: aarch64
            deb_arch: arm64
            rpm_arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y $APT_PACKAGES

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install quick-sharun
        run: |
          sudo curl --fail --location --retry 3 \
            https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/refs/heads/main/useful-tools/quick-sharun.sh \
            --output /usr/local/bin/quick-sharun
          sudo chmod +x /usr/local/bin/quick-sharun

      - name: Build DEB
        run: |
          FASTTAB_SKIP_RPM=1 bash ./build_packages.sh --native-only
          mkdir -p deb-dist
          cp -a dist/. deb-dist/

      - name: Build RPM
        run: |
          FASTTAB_SKIP_DEB=1 bash ./build_packages.sh --native-only
          mkdir -p rpm-dist
          cp -a dist/. rpm-dist/

      - name: Build AppImage
        run: |
          bash ./build_packages.sh --appimage-only
          cp -a deb-dist/. dist/
          cp -a rpm-dist/. dist/

      - name: Validate release files
        env:
          APPIMAGE_ARCH: ${{ matrix.appimage_arch }}
          DEB_ARCH: ${{ matrix.deb_arch }}
          RPM_ARCH: ${{ matrix.rpm_arch }}
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          APPIMAGE="dist/FastTab-${VERSION}-${APPIMAGE_ARCH}.AppImage"
          DEB="dist/fasttab_${VERSION}_${DEB_ARCH}.deb"
          RPM="dist/fasttab-${VERSION}-1.${RPM_ARCH}.rpm"

          test -s "$APPIMAGE"
          test -s "$APPIMAGE.zsync"
          test -s "$APPIMAGE.sha256"
          test -s "$DEB"
          test -s "$DEB.sha256"
          test -s "$RPM"
          test -s "$RPM.sha256"

          for size in 16 32 64 128 256; do
            test -s "AppDir/usr/share/icons/hicolor/${size}x${size}/apps/fasttab.png"
          done
          test -s AppDir/usr/share/icons/hicolor/scalable/apps/fasttab.svg
          test -s AppDir/usr/share/pixmaps/fasttab.png
          test -s AppDir/usr/share/doc/fasttab/LICENSE.md

          dpkg-deb --field "$DEB" Package Version Architecture
          rpm -qp "$RPM"
          rpm -qp --qf '%{LICENSE}\n' "$RPM" | grep -Fxq 'GPL-3.0-only'

          (
            cd dist
            sha256sum -c "$(basename "$APPIMAGE.sha256")"
            sha256sum -c "$(basename "$DEB.sha256")"
            sha256sum -c "$(basename "$RPM.sha256")"
          )

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: fasttab-${{ matrix.appimage_arch }}-release-files
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [test, packages]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify --quiet "refs/tags/$VERSION" >/dev/null; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release files
        if: steps.version.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: fasttab-*-release-files
          path: dist
          merge-multiple: true

      - name: Validate complete release set
        if: steps.version.outputs.publish == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for arch in x86_64 aarch64; do
            test -s "dist/FastTab-${VERSION}-${arch}.AppImage"
            test -s "dist/FastTab-${VERSION}-${arch}.AppImage.zsync"
            test -s "dist/FastTab-${VERSION}-${arch}.AppImage.sha256"
          done
          for arch in amd64 arm64; do
            test -s "dist/fasttab_${VERSION}_${arch}.deb"
            test -s "dist/fasttab_${VERSION}_${arch}.deb.sha256"
          done
          for arch in x86_64 aarch64; do
            test -s "dist/fasttab-${VERSION}-1.${arch}.rpm"
            test -s "dist/fasttab-${VERSION}-1.${arch}.rpm.sha256"
          done

      - name: Write release notes
        if: steps.version.outputs.publish == 'true'
        run: |
          cat > RELEASE_NOTES.md <<'NOTES'
          FastTab 2.0.7 fixes intermittent transparent Firefox previews while retaining the generic live-preview lifecycle and workspace layout correction.

          Highlights:

          - Treats every X11 window preview as opaque when a client supplies valid RGB with zero or undefined pixmap alpha.
          - Keeps the correction generic in the shared downsample shader without application-name checks.
          - Sizes the switcher to the measured workspace bar so the last workspace remains fully visible.
          - Keeps a single window card centered when the workspace bar determines the container width.
          - Removes application-specific Edge, Remmina, and root-framebuffer capture rules.
          - Releases XComposite/GLX bindings while hidden and reacquires fresh backing pixmaps on show.
          - Restores one common dynamic preview path for Firefox, Chrome/Chromium, Edge, video, Remmina, and other X11 clients.
          - Keeps cached snapshots only as cross-workspace and temporarily-unmapped fallbacks.
          - Retains x86_64 and ARM64/AArch64 AppImage, DEB, and RPM packages.

          FastTab requires Linux, X11, and hardware-accelerated OpenGL.
          NOTES

      - name: Publish FastTab release
        if: steps.version.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: FastTab ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist/*
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true
