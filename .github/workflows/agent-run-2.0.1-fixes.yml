name: Run FastTab 2.0.1 fix

on:
  push:
    branches:
      - agent/fix-preview-font-exit-lag-2.0.1
    paths:
      - .github/workflows/agent-run-2.0.1-fixes.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'agent/fix-preview-font-exit-lag-2.0.1'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-preview-font-exit-lag-2.0.1
          fetch-depth: 0

      - name: Extract and execute the fix script
        run: |
          cat > /tmp/extract_fix.py <<'PYCODE'
          from pathlib import Path

          source = Path('.github/workflows/agent-apply-2.0.1-fixes.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end_marker = "\n          PY\n\n      - name: Commit generated fix"
          end = source.rindex(end_marker)
          raw_lines = source[start:end].splitlines()

          output = []
          inside_triple = False
          for line in raw_lines:
              if not inside_triple and line.startswith('          '):
                  line = line[10:]
              output.append(line)
              if line.count("'''") % 2 == 1:
                  inside_triple = not inside_triple

          Path('/tmp/apply_fix.py').write_text('\n'.join(output) + '\n', encoding='utf-8')
          PYCODE
          python /tmp/extract_fix.py
          python /tmp/apply_fix.py
          rm -f .github/workflows/agent-run-2.0.1-fixes.yml

      - name: Commit the completed fix
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix preview persistence, title glyphs, and exit latency"
          git push origin HEAD:agent/fix-preview-font-exit-lag-2.0.1
