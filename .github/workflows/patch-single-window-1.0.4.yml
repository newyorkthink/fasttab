name: Patch single-window Win+Tab behavior

on:
  push:
    branches:
      - agent/show-single-window-1.0.4

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/show-single-window-1.0.4
          fetch-depth: 0

      - name: Apply source and release changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app = Path('src/app.zig')
          text = app.read_text()
          old = 'if (self.filtered_items.items.len <= 1) {'
          new = 'if (self.filtered_items.items.len == 0) {'
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one single-window guard, found {text.count(old)}')
          app.write_text(text.replace(old, new, 1))

          Path('VERSION').write_text('1.0.4\n')

          desktop = Path('packaging/fasttab.desktop')
          text = desktop.read_text()
          if 'X-AppImage-Version=1.0.3' not in text:
              raise SystemExit('unexpected desktop version')
          desktop.write_text(text.replace('X-AppImage-Version=1.0.3', 'X-AppImage-Version=1.0.4'))

          readme = Path('README.md')
          text = readme.read_text().replace('1.0.3', '1.0.4')
          old_note = 'The AppImage automatically replaces an older running FastTab daemon. In 1.0.3, Win+Tab routing no longer depends on the delivered Super/Mod4 state bit, so current-workspace switching works on X11 setups that omit it.'
          new_note = 'The AppImage automatically replaces an older running FastTab daemon. In 1.0.4, Win+Tab also displays the switcher when the current workspace contains exactly one window.'
          if old_note in text:
              text = text.replace(old_note, new_note)
          readme.write_text(text)

          ci = Path('.github/workflows/ci.yml')
          text = ci.read_text()
          text = text.replace(
              "echo \"FastTab ${VERSION} fixes Win+Tab event routing on X11.\"",
              "echo \"FastTab ${VERSION} shows Win+Tab even when the current workspace has one window.\"",
          )
          text = text.replace(
              "echo \"Idle grabbed Tab events are now routed by the Alt modifier instead of requiring the delivered Super/Mod4 state bit. Alt+Tab continues to switch across all tracked windows, while Win+Tab reliably enters current-workspace mode.\"",
              "echo \"Win+Tab now opens the current-workspace switcher for any non-empty workspace, including a workspace containing exactly one window. Empty workspaces still do not open the switcher.\"",
          )
          marker = "          grep -Fq '.current_workspace => application.handleWinTab' src/main.zig\n"
          addition = marker + "          grep -Fq 'if (self.filtered_items.items.len == 0)' src/app.zig\n          if grep -Fq 'if (self.filtered_items.items.len <= 1)' src/app.zig; then\n            echo \"Single-window current-workspace switching must remain enabled.\" >&2\n            exit 1\n          fi\n"
          if marker not in text:
              raise SystemExit('CI validation marker not found')
          text = text.replace(marker, addition, 1)
          ci.write_text(text)

          Path('.github/workflows/patch-single-window-1.0.4.yml').unlink()
          PY

      - name: Commit patched files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/app.zig VERSION packaging/fasttab.desktop README.md .github/workflows/ci.yml .github/workflows/patch-single-window-1.0.4.yml
          git commit -m "Show single-window current-workspace switcher"
          git push origin HEAD:agent/show-single-window-1.0.4
