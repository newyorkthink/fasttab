name: Apply FastTab 2.0.2 preview fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  apply:
    if: github.head_ref == 'agent/fix-cross-workspace-preview-2.0.2'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-cross-workspace-preview-2.0.2
          fetch-depth: 0

      - name: Apply source and release changes
        run: python .github/scripts/apply_cross_workspace_preview_2_0_2.py

      - name: Export generated files
        run: |
          mkdir -p generated/src generated/packaging generated/.github/workflows
          cp src/app.zig src/main.zig generated/src/
          cp VERSION README.md README.zh-CN.md build_packages.sh generated/
          cp packaging/fasttab.desktop generated/packaging/
          cp .github/workflows/ci.yml generated/.github/workflows/
          git diff --check > generated/diff-check.txt 2>&1 || true
          git diff > generated/fix.patch

      - uses: actions/upload-artifact@v4
        with:
          name: fasttab-2.0.2-generated-fix
          path: generated
          if-no-files-found: error
          retention-days: 1
