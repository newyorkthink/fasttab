name: Apply AppImage symlink fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/fix-appimage-symlink-launch-1.0.6' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-appimage-symlink-launch-1.0.6
          fetch-depth: 0

      - name: Apply patch
        run: python3 .github/scripts/apply_symlink_fix.py

      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix AppImage launches through fasttab symlinks"
          git push origin HEAD:agent/fix-appimage-symlink-launch-1.0.6
