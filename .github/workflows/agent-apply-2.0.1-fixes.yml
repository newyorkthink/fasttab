              text = p.read_text(encoding="utf-8")
              text = text.replace("2.0.0", "2.0.1")
              if chinese:
                  text = text.replace(
                      "FastTab 2.0.1 是首个正式多架构版本，主要包括：",
                      "FastTab 2.0.1 是稳定性修复版本，主要包括：",
                  )
                  marker = "- `Alt+Tab` 显示全部窗口，`Win+Tab` 仅显示当前工作区窗口。\n"
                  additions = (
                      "- 修复 Firefox、Vivaldi 等浏览器预览在多次切换后退化为应用图标的问题。\n"
                      "- 退出切换器后按帧生成缓存预览，不再同步处理全部窗口，从而消除松开 `Alt/Win` 时的卡顿。\n"
                      "- Nerd Font、Powerline 等私有区标题符号会转换为普通分隔符，不再显示为 `?`。\n"
                  )
              else:
                  text = text.replace(
                      "FastTab 2.0.1 is the first formal multi-architecture release. It includes:",
                      "FastTab 2.0.1 is a stability release. It includes:",
                  )
                  marker = "- Reliable global `Alt+Tab` switching and current-workspace `Win+Tab` switching.\n"
                  additions = (
                      "- Preserve Firefox, Vivaldi, and other browser previews across repeated switches and transient GLX failures.\n"
                      "- Build cached previews incrementally after hiding, removing the pause when `Alt` or `Super` is released.\n"
                      "- Replace unsupported Nerd Font and Powerline private-use title glyphs with a plain separator instead of `?`.\n"
                  )
              if additions not in text:
                  if marker not in text:
                      raise SystemExit(f"{readme}: release bullet marker missing")
                  text = text.replace(marker, additions + marker, 1)
              p.write_text(text, encoding="utf-8")

          # CI/CD publishes 2.0.1 with release notes describing the actual fixes.
          ci = Path(".github/workflows/ci.yml")
          ci_text = ci.read_text(encoding="utf-8").replace("2.0.0", "2.0.1")
          ci_text = ci_text.replace(
              "FastTab 2.0.1 is the first formal multi-architecture release.",
              "FastTab 2.0.1 is a stability release for preview persistence and switcher latency.",
          )
          highlight = "          - Correct CLI stream behavior: help and version use standard output; errors use standard error.\n"
          fix_highlights = (
              "          - Preserve browser previews across repeated Alt+Tab and Win+Tab sessions, including transient GLX refresh failures.\n"
              "          - Move fallback snapshot generation out of the synchronous hide path to eliminate exit hitching.\n"
              "          - Sanitize unsupported private-use title glyphs so terminal titles no longer contain replacement question marks.\n"
          )
          if highlight not in ci_text:
              raise SystemExit("ci.yml: release highlight marker missing")
          ci_text = ci_text.replace(highlight, fix_highlights + highlight, 1)
          ci.write_text(ci_text, encoding="utf-8")

          # Audit whichever VERSION is current only after CI/CD has completed on main,
          # avoiding a pull-request/release race and making future patch releases generic.
          Path(".github/workflows/release-audit.yml").write_text(r'''name: Release Audit

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI/CD]
    types: [completed]

permissions:
  contents: read

jobs:
  audit-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve and validate release tag source
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git fetch --tags --force
          git show "$VERSION:VERSION" | grep -Fxq "$VERSION"
          git show "$VERSION:build_packages.sh" | grep -Fq 'License:        GPL-3.0-only'
          git show "$VERSION:build_packages.sh" | grep -Fq '/usr/share/doc/fasttab/LICENSE.md'

      - name: Wait for and validate published release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for attempt in $(seq 1 20); do
            if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${VERSION}" > release.json 2>/dev/null; then
              break
            fi
            if [[ "$attempt" == 20 ]]; then
              echo "Release ${VERSION} was not published within the audit window." >&2
              exit 1
            fi
            sleep 15
          done

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          release = json.loads(Path("release.json").read_text(encoding="utf-8"))
          assert release["tag_name"] == version
          assert release["draft"] is False
          assert release["prerelease"] is False

          expected = {
              f"FastTab-{version}-x86_64.AppImage",
              f"FastTab-{version}-x86_64.AppImage.sha256",
              f"FastTab-{version}-x86_64.AppImage.zsync",
              f"FastTab-{version}-aarch64.AppImage",
              f"FastTab-{version}-aarch64.AppImage.sha256",
              f"FastTab-{version}-aarch64.AppImage.zsync",
              f"fasttab_{version}_amd64.deb",
              f"fasttab_{version}_amd64.deb.sha256",
              f"fasttab_{version}_arm64.deb",
              f"fasttab_{version}_arm64.deb.sha256",
              f"fasttab-{version}-1.x86_64.rpm",
              f"fasttab-{version}-1.x86_64.rpm.sha256",
              f"fasttab-{version}-1.aarch64.rpm",
              f"fasttab-{version}-1.aarch64.rpm.sha256",
          }

          assets = {asset["name"]: asset for asset in release["assets"]}
          missing = expected - assets.keys()
          assert not missing, f"Missing release assets: {sorted(missing)}"
          assert all(assets[name]["size"] > 0 for name in expected)
          assert "fasttab-x86_64" not in assets
          PY
''', encoding="utf-8")

          # The one-shot workflow must not remain in the pull request.
          Path(".github/workflows/agent-apply-2.0.1-fixes.yml").unlink()
          PY

      - name: Commit generated fix
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix preview persistence, title glyphs, and exit latency"
          git push origin HEAD:agent/fix-preview-font-exit-lag-2.0.1
